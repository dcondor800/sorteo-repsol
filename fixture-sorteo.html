<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixture del Sorteo · Repsol</title>
  <style>
    /* =========================================================
       VARIABLES Y RESET
    ========================================================= */
    :root {
      --bg-main:   #08101e;
      --bg-header: rgba(6, 12, 22, 0.97);

      /* Colores de disciplina */
      --c-voley-mixto:      #f59e0b;
      --c-futbol-masculino: #4ade80;
      --c-voley-femenino:   #f0abfc;
      --c-padel:            #7dd3fc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Diseño de pantalla completa, optimizado para 16:9 */
    html { height: 100%; }
    body {
      height: 100%;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: radial-gradient(ellipse at top, #0d1a2e 0%, #05080f 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* =========================================================
       HEADER
    ========================================================= */
    .app-header {
      background: var(--bg-header);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .header-logo img {
      height: 38px;
      object-fit: contain;
    }

    .header-title {
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 3px;
      /* Texto con degradado */
      background: linear-gradient(90deg, #ffffff 0%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-clock {
      font-size: clamp(13px, 1.5vw, 18px);
      font-weight: 700;
      color: rgba(255, 255, 255, 0.4);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    /* =========================================================
       ÁREA PRINCIPAL: columnas por disciplina
    ========================================================= */
    .main-content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 16px;
      padding: 18px 22px;
      overflow: hidden;
      min-height: 0;
    }

    /* =========================================================
       ESTADO VACÍO
    ========================================================= */
    #empty-state {
      grid-column: 1 / -1;
      grid-row: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: rgba(255, 255, 255, 0.22);
    }
    .empty-icon { font-size: clamp(48px, 8vw, 80px); }
    .empty-text {
      font-size: clamp(16px, 2.2vw, 24px);
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* =========================================================
       SECCIONES DE DISCIPLINA
    ========================================================= */
    .disc-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.06);
      overflow: hidden;
      transition: opacity 0.3s;
    }
    .disc-section.hidden { display: none; }

    .disc-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    /* Borde izquierdo de color por disciplina */
    .disc-voley-mixto      .disc-header { border-left: 3px solid var(--c-voley-mixto); }
    .disc-futbol-masculino .disc-header { border-left: 3px solid var(--c-futbol-masculino); }
    .disc-voley-femenino   .disc-header { border-left: 3px solid var(--c-voley-femenino); }
    .disc-padel            .disc-header { border-left: 3px solid var(--c-padel); }

    .disc-icon { font-size: clamp(14px, 1.6vw, 20px); }
    .disc-name {
      font-size: clamp(11px, 1.2vw, 15px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .disc-voley-mixto      .disc-name { color: var(--c-voley-mixto); }
    .disc-futbol-masculino .disc-name { color: var(--c-futbol-masculino); }
    .disc-voley-femenino   .disc-name { color: var(--c-voley-femenino); }
    .disc-padel            .disc-name { color: var(--c-padel); }

    .disc-count {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.4);
      margin-left: auto;
    }

    /* =========================================================
       LISTA DE PARTIDOS DENTRO DE CADA SECCIÓN
    ========================================================= */
    .disc-matches {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
    }

    /* =========================================================
       TARJETA DE PARTIDO
    ========================================================= */
    .match-card {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s ease;
    }
    .match-card:hover { transform: translateY(-1px); }

    /* Glow sutil por disciplina */
    .disc-voley-mixto      .match-card { box-shadow: 0 2px 18px rgba(245,158,11,0.1); }
    .disc-futbol-masculino .match-card { box-shadow: 0 2px 18px rgba(74,222,128,0.1); }
    .disc-voley-femenino   .match-card { box-shadow: 0 2px 18px rgba(240,171,252,0.1); }
    .disc-padel            .match-card { box-shadow: 0 2px 18px rgba(125,211,252,0.1); }

    /* Animación de entrada de nueva tarjeta */
    .match-card.card-enter {
      animation: cardIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .match-team {
      font-size: clamp(13px, 1.6vw, 16px);
      font-weight: 800;
      color: #f1f5f9;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .team-left  { text-align: right; }
    .team-right { text-align: left; }

    .match-vs {
      font-size: clamp(13px, 1.4vw, 14px);
      font-weight: 900;
      color: #facc15;
      letter-spacing: 2px;
      padding: 0 6px;
      flex-shrink: 0;
    }

    /* =========================================================
       OVERLAY DE ANIMACIÓN (pantalla completa)
    ========================================================= */
    #anim-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 18, 0.97);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.55s ease;
      backdrop-filter: blur(6px);
    }
    #anim-overlay.anim-visible { opacity: 1; pointer-events: all; }
    #anim-overlay.anim-hiding  { opacity: 0; pointer-events: none; }

    /* Contenedor central del versus animado */
    .anim-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(20px, 4vh, 40px);
      text-align: center;
      padding: 24px;
    }

    /* Badge de disciplina */
    #anim-discipline {
      font-size: clamp(14px, 2vw, 22px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 5px;
      padding: 10px 32px;
      border-radius: 999px;
      border: 2px solid #fff;
      color: #fff;
      /* Estado inicial (invisible, desplazado) */
      opacity: 0;
      transform: translateY(-40px);
      transition: opacity 0.5s ease, transform 0.55s ease;
    }
    #anim-discipline.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Fila de equipos + VS */
    .anim-matchup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(14px, 3vw, 48px);
    }

    /* Equipo 1: entra desde la izquierda */
    #anim-team1 {
      opacity: 0;
      transform: translateX(-90px);
      transition: opacity 0.55s ease, transform 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #anim-team1.show {
      opacity: 1;
      transform: translateX(0);
    }

    /* Equipo 2: entra desde la derecha */
    #anim-team2 {
      opacity: 0;
      transform: translateX(90px);
      transition: opacity 0.55s ease, transform 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #anim-team2.show {
      opacity: 1;
      transform: translateX(0);
    }

    /* Nombre del equipo: texto grande */
    .anim-team-name {
      font-size: clamp(26px, 5.5vw, 68px);
      font-weight: 900;
      color: #ffffff;
      text-shadow: 0 0 50px rgba(255, 255, 255, 0.25);
      max-width: 34vw;
      word-break: break-word;
      line-height: 1.1;
    }

    /* VS central: escala desde cero */
    #anim-vs {
      font-size: clamp(28px, 5vw, 64px);
      font-weight: 900;
      color: #facc15;
      letter-spacing: 3px;
      text-shadow: 0 0 40px rgba(250, 204, 21, 0.55);
      opacity: 0;
      transform: scale(0.1);
      transition: opacity 0.4s ease, transform 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      flex-shrink: 0;
    }
    #anim-vs.show {
      opacity: 1;
      transform: scale(1);
    }

    /* =========================================================
       CONFETTI
    ========================================================= */
    #confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      overflow: hidden;
    }
    .confetti-particle {
      position: absolute;
      top: -12px;
      border-radius: 2px;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0px)    rotate(0deg);   opacity: 1; }
      20%  { transform: translateY(22vh)   rotate(200deg); opacity: 1; }
      50%  { transform: translateY(52vh)   rotate(430deg); opacity: 1; }
      80%  { transform: translateY(82vh)   rotate(640deg); opacity: 0.7; }
      100% { transform: translateY(108vh)  rotate(720deg); opacity: 0; }
    }

    /* =========================================================
       RESPONSIVE: móvil / tablet
    ========================================================= */
    @media (max-width: 900px) {
      html, body { overflow: auto; height: auto; }
      .main-content {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        overflow-y: auto;
      }
      .disc-section { min-height: 200px; }
      .anim-team-name { max-width: 90vw; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       HEADER: título + logo + reloj
  ============================================================ -->
  <header class="app-header">
    <div class="header-logo">
      <img src="repsol.png" alt="Repsol"
           onerror="this.style.display='none'">
    </div>
    <div class="header-title">Fixture del Sorteo</div>
    <div class="header-clock" id="clock">--:--:--</div>
  </header>

  <!-- ============================================================
       CONTENIDO PRINCIPAL: columna por disciplina
  ============================================================ -->
  <main class="main-content" id="main-content">

    <!-- Estado vacío: visible hasta que llegue el primer versus -->
    <div id="empty-state">
      <div class="empty-icon">🏆</div>
      <div class="empty-text">Esperando el primer sorteo…</div>
    </div>

    <!-- Sección: Vóley mixto -->
    <div id="sec-voley-mixto" class="disc-section disc-voley-mixto hidden">
      <div class="disc-header">
        <span class="disc-icon">🏐</span>
        <span class="disc-name">Vóley mixto</span>
        <span class="disc-count" id="count-voley-mixto">0 cruces</span>
      </div>
      <div class="disc-matches" id="matches-voley-mixto"></div>
    </div>

    <!-- Sección: Fútbol masculino -->
    <div id="sec-futbol-masculino" class="disc-section disc-futbol-masculino hidden">
      <div class="disc-header">
        <span class="disc-icon">⚽</span>
        <span class="disc-name">Fútbol masculino</span>
        <span class="disc-count" id="count-futbol-masculino">0 cruces</span>
      </div>
      <div class="disc-matches" id="matches-futbol-masculino"></div>
    </div>

    <!-- Sección: Fútbol femenino -->
    <div id="sec-voley-femenino" class="disc-section disc-voley-femenino hidden">
      <div class="disc-header">
        <span class="disc-icon">⚽</span>
        <span class="disc-name">Fútbol femenino</span>
        <span class="disc-count" id="count-voley-femenino">0 cruces</span>
      </div>
      <div class="disc-matches" id="matches-voley-femenino"></div>
    </div>

    <!-- Sección: Pádel -->
    <div id="sec-padel" class="disc-section disc-padel hidden">
      <div class="disc-header">
        <span class="disc-icon">🎾</span>
        <span class="disc-name">Pádel</span>
        <span class="disc-count" id="count-padel">0 cruces</span>
      </div>
      <div class="disc-matches" id="matches-padel"></div>
    </div>

  </main>

  <!-- ============================================================
       OVERLAY DE ANIMACIÓN (oculto hasta un nuevo versus)
  ============================================================ -->
  <div id="anim-overlay">
    <div class="anim-content">

      <!-- Badge de disciplina -->
      <div id="anim-discipline">DISCIPLINA</div>

      <!-- Fila equipos: Equipo 1 · VS · Equipo 2 -->
      <div class="anim-matchup">
        <div id="anim-team1">
          <div class="anim-team-name" id="anim-t1-name">Equipo 1</div>
        </div>
        <div id="anim-vs">VS</div>
        <div id="anim-team2">
          <div class="anim-team-name" id="anim-t2-name">Equipo 2</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Contenedor de partículas de confetti -->
  <div id="confetti-container"></div>

  <script>
    // =========================================================================
    // CONSTANTES
    // =========================================================================
    const LS_KEY  = 'fixture_sorteo_data';
    const BC_NAME = 'fixture_sorteo_channel';

    /**
     * Configuración de cada disciplina: ID de sección, contenedor de partidos,
     * contador y color de acento para la animación.
     */
    const DISCIPLINES = [
      {
        key:       'Vóley mixto',
        sectionId: 'sec-voley-mixto',
        matchesId: 'matches-voley-mixto',
        countId:   'count-voley-mixto',
        color:     '#f59e0b'
      },
      {
        key:       'Fútbol masculino',
        sectionId: 'sec-futbol-masculino',
        matchesId: 'matches-futbol-masculino',
        countId:   'count-futbol-masculino',
        color:     '#4ade80'
      },
      {
        key:       'Fútbol femenino',
        sectionId: 'sec-voley-femenino',
        matchesId: 'matches-voley-femenino',
        countId:   'count-voley-femenino',
        color:     '#f0abfc'
      },
      {
        key:       'Pádel',
        sectionId: 'sec-padel',
        matchesId: 'matches-padel',
        countId:   'count-padel',
        color:     '#7dd3fc'
      }
    ];

    /** Colores usados en el confetti (incluye colores de disciplina + extras). */
    const CONFETTI_COLORS = [
      '#f59e0b', '#4ade80', '#f0abfc', '#7dd3fc',
      '#ff6b6b', '#ffffff', '#ffd700', '#a78bfa', '#fb923c'
    ];

    /**
     * Tiempos (en ms) de cada paso de la secuencia de animación del overlay.
     */
    const T = {
      DISCIPLINE:  300,   // aparece el badge de disciplina
      TEAM1:       900,   // aparece equipo 1
      VS:          1550,  // aparece "VS"
      TEAM2:       2100,  // aparece equipo 2
      CONFETTI:    2600,  // arranca el confetti
      HIDE_START:  5400,  // empieza a cerrar el overlay
      HIDE_DONE:   5950,  // overlay completamente oculto → se muestra la tarjeta
    };

    // =========================================================================
    // ESTADO
    // =========================================================================
    let fixture     = [];  // Datos completos del fixture (array de versus)
    let animQueue   = [];  // Cola de versus pendientes de animar
    let isAnimating = false;

    // =========================================================================
    // COMUNICACIÓN
    // =========================================================================

    /** Canal BroadcastChannel para recibir cambios del dashboard en tiempo real. */
    const channel = new BroadcastChannel(BC_NAME);

    channel.onmessage = function (event) {
      const { type, versus, allData } = event.data;

      if (type === 'ADD') {
        // Nuevo versus: actualizar datos y encolar la animación
        fixture = allData;
        enqueueAnimation(versus);
      } else if (type === 'REMOVE' || type === 'UNDO' || type === 'CLEAR') {
        // Eliminación o limpieza: re-renderizar sin animación
        fixture = allData;
        renderFixture();
      }
    };

    /**
     * Respaldo: escucha cambios de localStorage desde otra pestaña/ventana.
     * Se activa cuando BroadcastChannel no recibe el mensaje (edge cases).
     */
    window.addEventListener('storage', function (e) {
      if (e.key !== LS_KEY) return;
      try {
        const newData = JSON.parse(e.newValue || '[]');
        // Solo re-renderizar (sin animar) para evitar duplicados con BroadcastChannel
        fixture = newData;
        renderFixture();
      } catch {
        fixture = [];
        renderFixture();
      }
    });

    // =========================================================================
    // PERSISTENCIA
    // =========================================================================

    /** Lee el fixture desde localStorage al cargar la página. */
    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        fixture = raw ? JSON.parse(raw) : [];
      } catch {
        fixture = [];
      }
    }

    // =========================================================================
    // SISTEMA DE COLA DE ANIMACIONES
    // =========================================================================

    /**
     * Añade un versus a la cola de animación.
     * Si no hay animación en curso, la inicia inmediatamente.
     * @param {object} versus - Objeto del versus a animar.
     */
    function enqueueAnimation(versus) {
      animQueue.push(versus);
      if (!isAnimating) processNextAnimation();
    }

    /**
     * Procesa el siguiente elemento de la cola.
     * Se llama recursivamente al finalizar cada animación.
     */
    function processNextAnimation() {
      if (animQueue.length === 0) {
        isAnimating = false;
        return;
      }
      isAnimating = true;
      const versus = animQueue.shift();

      runAnimation(versus, function () {
        renderFixture(versus.id);  // renderiza con la tarjeta nueva resaltada
        setTimeout(processNextAnimation, 350);
      });
    }

    // =========================================================================
    // ANIMACIÓN DEL OVERLAY
    // =========================================================================

    /**
     * Ejecuta la secuencia completa de animación para un nuevo versus.
     * Secuencia: overlay → disciplina → equipo1 → VS → equipo2 → confetti → cierre
     *
     * @param {object}   versus     - Objeto versus a presentar.
     * @param {Function} onComplete - Callback ejecutado cuando el overlay cierra.
     */
    function runAnimation(versus, onComplete) {
      const overlay   = document.getElementById('anim-overlay');
      const discEl    = document.getElementById('anim-discipline');
      const team1El   = document.getElementById('anim-team1');
      const vsEl      = document.getElementById('anim-vs');
      const team2El   = document.getElementById('anim-team2');
      const t1NameEl  = document.getElementById('anim-t1-name');
      const t2NameEl  = document.getElementById('anim-t2-name');

      // Colores del badge según disciplina
      const discConf  = DISCIPLINES.find(d => d.key === versus.disciplina);
      const color     = discConf ? discConf.color : '#ffffff';
      discEl.style.color       = color;
      discEl.style.borderColor = color;
      discEl.style.boxShadow   = `0 0 30px ${color}33`;

      // Rellenar textos
      discEl.textContent  = versus.disciplina.toUpperCase();
      t1NameEl.textContent = versus.equipo1;
      t2NameEl.textContent = versus.equipo2;

      // Resetear clases de visibilidad y limpiar confetti anterior
      overlay.classList.remove('anim-hiding');
      [discEl, team1El, vsEl, team2El].forEach(el => el.classList.remove('show'));
      clearConfetti();

      // Mostrar overlay (fade in)
      overlay.classList.add('anim-visible');

      // Secuencia de aparición de cada elemento
      const timers = [
        setTimeout(() => discEl.classList.add('show'),   T.DISCIPLINE),
        setTimeout(() => team1El.classList.add('show'),  T.TEAM1),
        setTimeout(() => vsEl.classList.add('show'),     T.VS),
        setTimeout(() => team2El.classList.add('show'),  T.TEAM2),
        setTimeout(() => createConfetti(),               T.CONFETTI),
      ];

      // Iniciar cierre del overlay
      timers.push(setTimeout(() => {
        overlay.classList.add('anim-hiding');

        // Tras la transición de fade-out, limpiar y ejecutar callback
        setTimeout(() => {
          overlay.classList.remove('anim-visible', 'anim-hiding');
          [discEl, team1El, vsEl, team2El].forEach(el => el.classList.remove('show'));
          clearConfetti();
          onComplete();
        }, T.HIDE_DONE - T.HIDE_START);

      }, T.HIDE_START));
    }

    // =========================================================================
    // CONFETTI
    // =========================================================================

    /**
     * Crea 80 partículas de confetti que caen desde la parte superior
     * con posición, tamaño, color, duración y delay aleatorios.
     */
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';

      for (let i = 0; i < 80; i++) {
        const p        = document.createElement('div');
        const size     = 4 + Math.random() * 9;
        const duration = 2.8 + Math.random() * 2.5;
        const delay    = Math.random() * 1.8;
        const color    = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        const isCircle = Math.random() > 0.6;

        p.className = 'confetti-particle';
        p.style.cssText = [
          `left: ${Math.random() * 100}%`,
          `width: ${size}px`,
          `height: ${size * (0.5 + Math.random() * 0.8)}px`,
          `background: ${color}`,
          `animation: confettiFall ${duration}s ${delay}s linear forwards`,
          `border-radius: ${isCircle ? '50%' : '2px'}`,
          `opacity: 1`
        ].join('; ');

        container.appendChild(p);
      }
    }

    /** Elimina todas las partículas de confetti del DOM. */
    function clearConfetti() {
      document.getElementById('confetti-container').innerHTML = '';
    }

    // =========================================================================
    // RENDERIZADO DEL FIXTURE
    // =========================================================================

    /**
     * Re-renderiza todo el fixture agrupado por disciplina.
     * Muestra u oculta cada sección según si tiene partidos.
     *
     * @param {string|null} highlightId - ID del versus nuevo (recibe animación de entrada).
     */
    function renderFixture(highlightId = null) {
      const emptyState = document.getElementById('empty-state');
      const hasData    = fixture.length > 0;

      // Mostrar u ocultar el estado vacío
      emptyState.style.display = hasData ? 'none' : 'flex';

      DISCIPLINES.forEach(disc => {
        const matches    = fixture.filter(v => v.disciplina === disc.key);
        const sectionEl  = document.getElementById(disc.sectionId);
        const matchesEl  = document.getElementById(disc.matchesId);
        const countEl    = document.getElementById(disc.countId);

        // Ocultar sección si no tiene partidos
        if (matches.length === 0) {
          sectionEl.classList.add('hidden');
          return;
        }

        sectionEl.classList.remove('hidden');
        countEl.textContent = `${matches.length} ${matches.length === 1 ? 'cruce' : 'cruces'}`;

        // Construir tarjetas de partidos
        matchesEl.innerHTML = matches.map(v => {
          const isNew = v.id === highlightId;
          return `
            <div class="match-card ${isNew ? 'card-enter' : ''}" data-id="${v.id}">
              <div class="match-team team-left">${escapeHtml(v.equipo1)}</div>
              <div class="match-vs">VS</div>
              <div class="match-team team-right">${escapeHtml(v.equipo2)}</div>
            </div>`;
        }).join('');

        // Hacer scroll hasta la tarjeta nueva
        if (highlightId && matches.some(v => v.id === highlightId)) {
          matchesEl.scrollTop = matchesEl.scrollHeight;
        }
      });
    }

    // =========================================================================
    // RELOJ EN TIEMPO REAL
    // =========================================================================

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = [
        String(now.getHours()).padStart(2, '0'),
        String(now.getMinutes()).padStart(2, '0'),
        String(now.getSeconds()).padStart(2, '0')
      ].join(':');
    }

    // =========================================================================
    // UTILIDADES
    // =========================================================================

    /** Previene inyección de HTML al insertar nombres de equipos en el DOM. */
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // =========================================================================
    // INICIALIZACIÓN
    // =========================================================================
    loadFromStorage();
    renderFixture();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
